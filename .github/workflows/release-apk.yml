name: Release APK

on:
  push:
    branches: ['main']

permissions:
  contents: write

concurrency:
  group: release-apk
  cancel-in-progress: true

jobs:
  release-apk:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install dependencies
        run: npm ci

      - name: Generate native codegen artifacts
        working-directory: android
        run: ./gradlew generateCodegenArtifactsFromSchema

      - name: Build release APK
        working-directory: android
        run: ./gradlew :app:assembleRelease -PreactNativeArchitectures=armeabi-v7a,arm64-v8a

      - name: Build wear release APK
        working-directory: android
        run: ./gradlew :wear:assembleRelease

      - name: Delete existing latest release
        continue-on-error: true
        run: gh release delete latest --yes --cleanup-tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create latest release
        run: |
          gh release create latest \
            android/app/build/outputs/apk/release/app-release.apk \
            android/wear/build/outputs/apk/release/wear-release.apk \
            --title "Latest Build" \
            --notes "Built from commit ${{ github.sha }}" \
            --prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
