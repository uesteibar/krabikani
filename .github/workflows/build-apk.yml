name: Build APK

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install dependencies
        run: npm ci

      - name: Generate native codegen artifacts
        working-directory: android
        run: ./gradlew generateCodegenArtifactsFromSchema

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease -PreactNativeArchitectures=armeabi-v7a,arm64-v8a

      - name: Build wear release APK
        working-directory: android
        run: ./gradlew :wear:assembleRelease

      - name: Upload APK artifact
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Upload wear APK artifact
        id: upload-wear
        uses: actions/upload-artifact@v4
        with:
          name: wear-release-apk
          path: android/wear/build/outputs/apk/release/wear-release.apk

      - name: Comment on PR with artifact link
        uses: actions/github-script@v7
        env:
          ARTIFACT_URL: ${{ steps.upload.outputs.artifact-url }}
          WEAR_ARTIFACT_URL: ${{ steps.upload-wear.outputs.artifact-url }}
        with:
          script: |
            const marker = '<!-- apk-bot -->';
            const artifactUrl = process.env.ARTIFACT_URL;
            const wearArtifactUrl = process.env.WEAR_ARTIFACT_URL;
            const body = `${marker}\n**APK Build** for ${context.sha.slice(0, 7)}\n\n[Download phone APK](${artifactUrl})\n[Download wear APK](${wearArtifactUrl})`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
